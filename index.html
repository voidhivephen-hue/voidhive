<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDHIVE — Cyber Phenomenon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#05010f;
  color:white;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo {
  font-family:'Orbitron';
  color:#FF00FF;
}

.btn {
  padding:12px 20px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#FF00FF,#00FFFF);
  color:white;
  cursor:pointer;
}

.wallet-status {
  font-size:0.8rem;
  margin-top:5px;
}

.connected {
  background:#39FF9F !important;
  color:black !important;
}

.hero {
  text-align:center;
  margin-top:120px;
}

.wallet-popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
}

.wallet-popup-box {
  background:#0A001F;
  padding:25px;
  border-radius:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">VOIDHIVE</div>

  <div>
    <button id="walletBtn" class="btn" onclick="connectWallet()">
      Connect Wallet
    </button>
    <div id="walletStatus" class="wallet-status">
      ⚫ Not Connected
    </div>
  </div>
</div>

<div class="hero">
  <h1>VOIDHIVE</h1>
  <p id="heroText">Crypto • Community • Alpha</p>
</div>

<!-- MOBILE POPUP -->
<div id="walletPopup" class="wallet-popup">
  <div class="wallet-popup-box">
    <h3>👻 OPEN IN PHANTOM</h3>
    <p>
      Step 1: Open in Phantom<br>
      Step 2: Tap Connect Wallet<br>
      Step 3: Approve connection
    </p>
    <button onclick="openPhantom()" class="btn">Open Phantom</button>
  </div>
</div>

<script>

/* 🔑 SUPABASE CONFIG */
const SUPABASE_URL = "https://xlkoukswxydkidlbuunv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsa291a3N3eHlka2lkbGJ1dW52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDk4OTMsImV4cCI6MjA4OTQyNTg5M30.bfgZXToibaGAhLWqCB6MveIyYvdleWiHf-zKKfFJq7g";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* CONNECT WALLET */
async function connectWallet(){
  try {

    if (window.solana && window.solana.isPhantom) {

      const resp = await window.solana.connect({
        onlyIfTrusted:false
      });

      const wallet = resp.publicKey.toString();

      updateUI(wallet);
      await saveWallet(wallet);

    } else {

      const isMobile = /iPhone|Android/i.test(navigator.userAgent);

      if(isMobile){
        showPopup();
      } else {
        window.open("https://phantom.app/", "_blank");
      }

    }

  } catch(err){
    console.log(err);
  }
}

/* SAVE WALLET TO SUPABASE */
async function saveWallet(wallet){

  // prevent duplicates locally
  if(localStorage.getItem("savedWallet") === wallet){
    showWhitelisted();
    return;
  }

  // check database
  const { data: existing } = await supabaseClient
    .from("wallets")
    .select("*")
    .eq("wallet", wallet);

  if(existing && existing.length > 0){
    showWhitelisted();
    return;
  }

  const { error } = await supabaseClient
    .from("wallets")
    .insert([{ wallet: wallet }]);

  if(error){
    console.log("❌", error.message);
  } else {
    localStorage.setItem("savedWallet", wallet);
    showWhitelisted();
  }
}

/* UI UPDATE */
function updateUI(wallet){
  const short = wallet.slice(0,4)+"..."+wallet.slice(-4);

  document.getElementById("walletBtn").innerText = short;
  document.getElementById("walletBtn").classList.add("connected");

  document.getElementById("walletStatus").innerText = "🟢 Connected";
  document.getElementById("heroText").innerText =
    "👾 Connected to VOIDHIVE";
}

/* WHITELIST UI */
function showWhitelisted(){
  document.getElementById("walletStatus").innerText =
    "👾 Whitelisted";
}

/* MOBILE */
function showPopup(){
  document.getElementById("walletPopup").style.display="flex";
}

function openPhantom(){
  window.location.href =
    "https://phantom.app/ul/browse/" + window.location.href;
}

</script>

</body>
</html>
