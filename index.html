<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOIDHIVE • Founding Form</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .logo-font { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="h-full bg-zinc-950 text-white flex flex-col min-h-screen">

  <!-- TOP NAV – your exact VOIDHIVE branding -->
  <nav class="fixed top-0 left-0 w-full h-16 bg-[#2F2F8F] text-white flex items-center justify-between px-6 md:px-12 z-50 shadow-lg">
    <div class="flex items-center gap-3">
      <div class="logo-font text-3xl font-bold tracking-[3px]">VOIDHIVE</div>
    </div>
  </nav>

  <!-- MAIN FORM CARD – clean modern style with your dark-blue accent -->
  <main class="flex-1 flex items-center justify-center pt-24 pb-12 px-4">
    <div class="max-w-md w-full bg-zinc-900 rounded-3xl shadow-2xl p-8 md:p-10 border border-[#2F2F8F]/30">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-[#2F2F8F] text-white rounded-2xl mb-4 text-4xl">🕳️</div>
        <h1 class="logo-font text-5xl font-bold tracking-widest text-white">VOIDHIVE</h1>
        <p class="text-[#2F2F8F] text-xl font-medium mt-1">Founding Form</p>
        <p class="text-zinc-400 mt-2">Your data goes straight into Supabase</p>
      </div>

      <form id="form" class="space-y-6">
        
        <!-- X Username -->
        <div>
          <label class="block text-sm font-medium mb-2 text-zinc-300">X Username</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400">@</span>
            <input 
              type="text" 
              id="x_username" 
              required
              placeholder="yourhandle"
              class="w-full bg-zinc-800 border border-zinc-700 focus:border-[#2F2F8F] rounded-3xl px-8 py-4 text-white placeholder:text-zinc-500 focus:outline-none transition-colors">
          </div>
        </div>

        <!-- Instagram Username -->
        <div>
          <label class="block text-sm font-medium mb-2 text-zinc-300">Instagram Username</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400">@</span>
            <input 
              type="text" 
              id="instagram_username" 
              required
              placeholder="yourhandle"
              class="w-full bg-zinc-800 border border-zinc-700 focus:border-[#2F2F8F] rounded-3xl px-8 py-4 text-white placeholder:text-zinc-500 focus:outline-none transition-colors">
          </div>
        </div>

        <!-- Solana Wallet Address – NEW -->
        <div>
          <label class="block text-sm font-medium mb-2 text-zinc-300">Solana Wallet Address</label>
          <input 
            type="text" 
            id="solana_wallet_address" 
            required
            placeholder="7xK...9pQ"
            class="w-full bg-zinc-800 border border-zinc-700 focus:border-[#2F2F8F] rounded-3xl px-4 py-4 text-white placeholder:text-zinc-500 focus:outline-none transition-colors">
          <p class="text-xs text-zinc-500 mt-1">Your Solana address (starts with a letter or number)</p>
        </div>

        <button 
          type="submit"
          id="submitBtn"
          class="w-full bg-[#2F2F8F] hover:bg-[#1f1f6b] active:scale-95 transition-all text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center gap-2">
          <span>SUBMIT FOUNDING FORM</span>
          <i class="fa-solid fa-rocket"></i>
        </button>
      </form>

      <div id="status" class="mt-6 text-center text-sm min-h-[24px]"></div>

      <!-- Debug button -->
      <button onclick="testConnection()" 
              class="mt-6 w-full text-xs flex items-center justify-center gap-1 text-zinc-400 hover:text-white transition-colors">
        <i class="fa-solid fa-plug"></i>
        <span>🔧 Test Supabase connection</span>
      </button>
    </div>
  </main>

  <!-- FOOTER – your social icons (update the href="#" links with real URLs) -->
  <footer class="bg-[#2F2F8F] py-8 text-white flex flex-col items-center gap-4 text-sm">
    <div class="social-links flex gap-8 text-3xl">
      <a href="#" target="_blank" aria-label="X (Twitter)" class="hover:text-white/70 transition-colors">
        <i class="fa-brands fa-x-twitter"></i>
      </a>
      <a href="#" target="_blank" aria-label="Instagram" class="hover:text-white/70 transition-colors">
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
    <p class="font-medium tracking-widest">© VOIDHIVE • THE HIVE IS FORMING</p>
  </footer>

  <script type="module">
    // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
    // REPLACE THESE TWO LINES WITH YOUR REAL SUPABASE VALUES
    const supabaseUrl = 'https://dylaymhkwsmbjscbppmc.supabase.co'
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5bGF5bWhrd3NtYmpzY2JwcG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTcwODEsImV4cCI6MjA5MDk3MzA4MX0.fx9z0pvfm96PlxXkKNv7yfs6CIZYeDyZUrOpx_u4Z2A'
    // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←

    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    const form = document.getElementById('form')
    const status = document.getElementById('status')
    const submitBtn = document.getElementById('submitBtn')

    function showStatus(message, color = 'blue') {
      status.innerHTML = `<span class="text-${color}-400">${message}</span>`
      console.log('%c' + message, `color: ${color === 'green' ? '#22c55e' : color === 'red' ? '#ef4444' : '#3b82f6'}`)
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      
      submitBtn.disabled = true
      submitBtn.innerHTML = `
        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        SUBMITTING TO VOIDHIVE...
      `

      const data = {
        x_username: document.getElementById('x_username').value.trim(),
        instagram_username: document.getElementById('instagram_username').value.trim(),
        monad_wallet_address: document.getElementById('monad_wallet_address').value.trim(),
        solana_wallet_address: document.getElementById('solana_wallet_address').value.trim()
      }

      console.log('🚀 Inserting VOIDHIVE data:', data)

      const { error } = await supabase
        .from('submissions')
        .insert([data])

      if (error) {
        console.error('Supabase error:', error)
        showStatus(`❌ ${error.message}`, 'red')
      } else {
        showStatus('✅ FOUNDING FORM SUBMITTED!<br>Welcome to VOIDHIVE. Your data is now in Supabase.', 'green')
        form.reset()
      }

      submitBtn.disabled = false
      submitBtn.innerHTML = `SUBMIT FOUNDING FORM <i class="fa-solid fa-rocket"></i>`
    })

    // Quick connection test
    window.testConnection = async () => {
      showStatus('Testing connection to Supabase...', 'blue')
      const { error } = await supabase.from('submissions').select('*').limit(1)
      if (error) {
        showStatus(`Connection failed: ${error.message}`, 'red')
      } else {
        showStatus('✅ Supabase is connected! You can submit now.', 'green')
      }
    }
  </script>
</body>
</html>
