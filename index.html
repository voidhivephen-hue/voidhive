<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDHIVE — Cyber Phenomenon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#05010f;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES BG */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(10px);
}
.logo {
  font-family:'Orbitron';
  color:#FF00FF;
}

/* HERO */
.hero {
  text-align:center;
  margin-top:100px;
}

.hero h1 {
  font-size:4rem;
  font-family:'Orbitron';
  background:linear-gradient(90deg,#FF00FF,#00FFFF);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  opacity:0.7;
  margin-top:10px;
}

.wallet-note {
  font-size: 0.8rem;
  opacity: 0.6;
  margin-top: 8px;
  color: #39FF9F;
  text-shadow: 0 0 8px rgba(57,255,159,0.5);
  font-family: 'Orbitron', sans-serif;
}

/* BUTTONS */
.btn {
  margin:10px;
  padding:12px 22px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover {
  background:#39FF9F;
  color:black;
  transform:translateY(-3px);
}

/* CARD */
.card {
  margin:60px auto;
  max-width:800px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
}

/* STATS */
.stats {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

/* DISCORD */
iframe {
  border-radius:15px;
}

/* FLOATING EMOJIS */
.floating {
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:2rem;
  animation:float 3s infinite alternate;
}
@keyframes float {
  from {transform:translateY(0);}
  to {transform:translateY(-10px);}
}

.wallet-ui {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
}

#walletBtn {
  font-weight:600;
  background:linear-gradient(90deg,#FF00FF,#00FFFF);
  border:none;
}

#walletBtn.connected {
  background:#39FF9F;
  color:black;
}

.wallet-status {
  font-size:0.75rem;
  opacity:0.7;
}

.wallet-status.connected {
  color:#39FF9F;
}

.wallet-status.saved {
  color:#00FFFF;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="nav">
  <div class="logo">VOIDHIVE</div>

  <div class="wallet-ui">
    <button id="walletBtn" class="btn" onclick="connectWallet()">
      Connect Wallet
    </button>

    <div id="walletStatus" class="wallet-status">
      ⚫ Not Connected
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>VOIDHIVE</h1>
  <p>Crypto • Community • Alpha</p>

  <div>
    <a href="https://discord.gg/uABRhAxWq" class="btn">Join Discord</a>
    <button class="btn" onclick="mint()">Mint NFT</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div>👾 <span id="online">132</span> Online</div>
    <div>🚀 <span id="total">1042</span> Members</div>
  </div>
</div>

<!-- CARD -->
<div class="card">
  <h2>THE HIVE AWAKENS</h2>
  <p>
  First generation mutants emerging on-chain.<br><br>
  Join early. Earn status. Become signal.
  </p>
</div>

<!-- DISCORD -->
<div style="text-align:center;">
<h2>LIVE SIGNAL</h2>
<iframe src="https://discord.com/widget?id=YOUR_SERVER_ID&theme=dark"
width="350" height="500"></iframe>
</div>

<!-- FLOAT -->
<div class="floating">👻 👾 🦩 🎃</div>

<script>

<div id="walletPopup" class="wallet-popup">
  <div class="wallet-popup-box">
    <h3>👻 OPEN IN PHANTOM</h3>
    <p>
      Step 1: Open in Phantom<br>
      Step 2: Tap Connect Wallet<br>
      Step 3: Approve connection
    </p>

    <button onclick="openPhantom()" class="btn">Open Phantom</button>
    <button onclick="closePopup()" class="btn secondary">Close</button>
  </div>
</div>

/* PARTICLES */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*1
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#FF00FF";
  particles.forEach(p=>{
    p.y+=p.speed;
    if(p.y>canvas.height) p.y=0;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });
  requestAnimationFrame(animate);
}
animate();

/* LIVE STATS */
setInterval(()=>{
  document.getElementById("online").innerText =
    Math.floor(Math.random()*200)+100;
  document.getElementById("total").innerText =
    Math.floor(Math.random()*2000)+1000;
},3000);

/* WALLET */
let currentWallet = null;

/* CONNECT WALLET */
async function connectWallet(){
  try {

    if (window.solana && window.solana.isPhantom) {

      const resp = await window.solana.connect({
        onlyIfTrusted: false
      });

      const wallet = resp.publicKey.toString();
      currentWallet = wallet;

      updateWalletUI(wallet);

      // Save wallet
      if(localStorage.getItem("savedWallet") !== wallet){
        saveWallet(wallet);
        localStorage.setItem("savedWallet", wallet);
        showSavedStatus();
      }

    } else {

      const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

      if(isMobile){
        showPopup();
      } else {
        window.open("https://phantom.app/", "_blank");
      }

    }

  } catch(err){
    console.log(err);
  }
}

function saveWallet(wallet){

  fetch("https://docs.google.com/forms/d/e/1FAIpQLSeT73rEVqMUc_aViNEMmheWcshw1pJZOep0xwuy2FWGkn8fJA/formResponse", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: `entry.2037248657=${wallet}`
  });

  console.log("Saved:", wallet);
}
  
/* FAKE MINT */
function mint(){
  alert("Mint coming soon 👾");
}

window.addEventListener("load", () => {

  // Detect Phantom browser
  if (window.solana && window.solana.isPhantom) {

    console.log("Phantom detected 👻");

    // Auto-connect (optional delay for UX)
  

});

function showConnectedUI(wallet){
  document.querySelector(".hero p").innerText =
    "👾 Connected: " + wallet.slice(0,4) + "..." + wallet.slice(-4);
}

function showPopup(){
  document.getElementById("walletPopup").style.display="flex";
}

function closePopup(){
  document.getElementById("walletPopup").style.display="none";
}

function openPhantom(){
  window.location.href =
  "https://phantom.app/ul/browse/" + window.location.href;
}

</script>

</body>
