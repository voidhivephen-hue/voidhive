<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDHIVE — Cyber Phenomenon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#05010f;
  color:white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo {
  font-family:'Orbitron';
  color:#FF00FF;
}

/* BUTTON */
.btn {
  padding:12px 20px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#FF00FF,#00FFFF);
  color:white;
  cursor:pointer;
}

/* STATUS */
.wallet-status {
  font-size:0.8rem;
  margin-top:5px;
}

/* POPUP */
.wallet-popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
}

.wallet-popup-box {
  background:#0A001F;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">VOIDHIVE</div>

  <div>
    <button onclick="connectWallet()" id="walletBtn" class="btn">
      Connect Wallet
    </button>
    <div id="walletStatus" class="wallet-status">⚫ Not Connected</div>
  </div>
</div>

<!-- POPUP -->
<div id="walletPopup" class="wallet-popup">
  <div class="wallet-popup-box">
    <p>Open inside Phantom 👻</p>
    <button onclick="openPhantom()" class="btn">Open Phantom</button>
  </div>
</div>

<script>

/* CONNECT WALLET */
async function connectWallet(){
  try {

    if (window.solana && window.solana.isPhantom) {

      const resp = await window.solana.connect({
        onlyIfTrusted:false
      });

      const wallet = resp.publicKey.toString();

      updateUI(wallet);
      saveWallet(wallet);

    } else {

      const isMobile = /iPhone|Android/i.test(navigator.userAgent);

      if(isMobile){
        showPopup();
      } else {
        window.open("https://phantom.app/", "_blank");
      }

    }

  } catch(e){
    console.log(e);
  }
}

/* UPDATE UI */
function updateUI(wallet){
  const short = wallet.slice(0,4)+"..."+wallet.slice(-4);

  document.getElementById("walletBtn").innerText = short;
  document.getElementById("walletStatus").innerText = "🟢 Connected";
}

/* SAVE WALLET */
function saveWallet(wallet){

  fetch("https://docs.google.com/forms/d/e/1FAIpQLSeT73rEVqMUc_aViNEMmheWcshw1pJZOep0xwuy2FWGkn8fJA/formResponse", {
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:`entry.2037248657=${wallet}`
  });

}

/* POPUP */
function showPopup(){
  document.getElementById("walletPopup").style.display="flex";
}

function openPhantom(){
  window.location.href =
  "https://phantom.app/ul/browse/" + window.location.href;
}

</script>

</body>
</html>
